name: Update Stream JSON

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install thư viện
        run: pip install requests beautifulsoup4

      - name: Chạy scraper
        run: python scraper.py

      - name: Lưu output.json vào repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output.json
          git diff --cached --quiet || git commit -m "🔄 Cập nhật $(date '+%H:%M %d/%m/%Y')"
          git push

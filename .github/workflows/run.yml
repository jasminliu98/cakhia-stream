name: Update Stream JSON

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install thu vien
        run: pip install requests beautifulsoup4 Pillow

      - name: Chay scraper
        env:
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: python scraper.py

      - name: Luu files vao repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output.json thumbs/
          git diff --cached --quiet || git commit -m "Update $(date '+%H:%M %d/%m/%Y')"
          git push
